name: Build and Deploy Spring Boot

on:
  workflow_dispatch:

  push:
    branches:
      - master

  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: List target files
        run: ls -la target

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: spring-boot-app
          path: target/*.jar

  deploy:
    needs: build
    runs-on: ubuntu-latest

    # IMPORTANT:
    # This enables GitHub Environment secrets
    environment:
      name: CFC_Backend

    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: spring-boot-app
          path: target/

      - name: List downloaded files
        run: ls -la target

      - name: Deploy to EC2
        env:
          PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
          HOST: ${{ secrets.HOST }}
          USER: ubuntu

        run: |
          echo "Deploying to $HOST"

          echo "$PRIVATE_KEY" > private_key.pem
          chmod 600 private_key.pem

          # Copy JAR to server
          scp -i private_key.pem \
          -o StrictHostKeyChecking=no \
          -o UserKnownHostsFile=/dev/null \
          target/*.jar \
          $USER@$HOST:/home/ubuntu/CFC_Backend/target/

          # Restart Spring Boot service
          ssh -i private_key.pem \
          -o StrictHostKeyChecking=no \
          -o UserKnownHostsFile=/dev/null \
          $USER@$HOST \
          "sudo systemctl restart my-spring-app"

      - name: Verify Service Status
        env:
          PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
          HOST: ${{ secrets.HOST }}
          USER: ubuntu

        run: |
          echo "$PRIVATE_KEY" > private_key.pem
          chmod 600 private_key.pem

          ssh -i private_key.pem \
          -o StrictHostKeyChecking=no \
          -o UserKnownHostsFile=/dev/null \
          $USER@$HOST \
          "sudo systemctl status my-spring-app --no-pager"
