spring.application.name=CFC
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

server.port=9090
spring.data.mongodb.auto-index-creation=true

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

jwt.secret=${JWT_SECRET:cfc-local-dev-secret-key-must-be-at-least-32-chars-long-1234567890}

# ---- Code execution provider ----
# Which sandbox backend executes user code. One of: judge0 | goboxd
# Default is judge0 so existing deployments keep working unchanged.
code.execution.provider=${CODE_EXECUTION_PROVIDER:judge0}

# Judge0 (RapidAPI) settings — used when provider=judge0
judge0.api.key=${JUDGE0_API_KEY:}
judge0.api.host=judge0-ce.p.rapidapi.com
judge0.api.base-url=https://judge0-ce.p.rapidapi.com

# goboxd settings — used when provider=goboxd
# Point this at your self-hosted goboxd instance (EC2, local docker, etc.)
goboxd.base-url=${GOBOXD_BASE_URL:http://localhost:8080}
