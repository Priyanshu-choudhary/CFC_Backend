# =============================================================================
# BASE CONFIG — shared across ALL profiles (local / docker / prod)
# Secrets use ${ENV_VAR} syntax. Spring resolves them from the OS environment
# at startup. Profile files only need to override what differs per environment.
# =============================================================================

spring.application.name=CFC

# Active profile is driven by ONE env var: SPRING_PROFILES_ACTIVE
# ECS task def sets this to "docker"; local dev defaults to "local"
spring.profiles.active=${SPRING_PROFILES_ACTIVE:docker}

# ── Server ────────────────────────────────────────────────────────────────────
server.port=9090
server.ssl.enabled=false

# ── MongoDB ───────────────────────────────────────────────────────────────────
spring.data.mongodb.auto-index-creation=true
# URI is defined per-profile (each env points to a different cluster/db)

# ── File Upload ───────────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
