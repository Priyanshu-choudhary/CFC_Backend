# =============================================================================
# BASE CONFIG — shared across ALL profiles (local / docker / prod)
# Secrets use ${ENV_VAR} syntax. Spring resolves them from the OS environment
# at startup. Profile files only need to override what differs per environment.
# =============================================================================

spring.application.name=CFC

# Active profile is driven by ONE env var: SPRING_PROFILES_ACTIVE
# ECS task def sets this to "docker"; local dev defaults to "local"
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# ── Server ────────────────────────────────────────────────────────────────────
server.port=9090
server.ssl.enabled=false

# ── MongoDB ───────────────────────────────────────────────────────────────────
spring.data.mongodb.auto-index-creation=true
# URI is defined per-profile (each env points to a different cluster/db)

# ── File Upload ───────────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── JWT ───────────────────────────────────────────────────────────────────────
# IMPORTANT: never ship a real secret here. Local has a dev default so the
# app starts without any env var. Docker/prod MUST override via AWS Secrets Manager.
jwt.secret=${JWT_SECRET:cfc-local-dev-secret-change-me-in-production-1234567890}

# ── AWS S3 ────────────────────────────────────────────────────────────────────
aws.s3.bucket-name=${AWS_S3_BUCKET_NAME:cfc-uploads-dev}
aws.s3.region=${AWS_S3_REGION:ap-south-1}
# CloudFront domain (no https://, no trailing slash) e.g. d1abc123.cloudfront.net
aws.cloudfront.domain=${AWS_CLOUDFRONT_DOMAIN:}

# ── Code Execution ────────────────────────────────────────────────────────────
code.execution.provider=${CODE_EXECUTION_PROVIDER:judge0}

# Judge0 (RapidAPI) — used when provider=judge0
judge0.api.key=${JUDGE0_API_KEY:}
judge0.api.host=judge0-ce.p.rapidapi.com
judge0.api.base-url=https://judge0-ce.p.rapidapi.com

# Goboxd (self-hosted) — used when provider=goboxd
goboxd.base-url=${GOBOXD_BASE_URL:http://localhost:8080}
