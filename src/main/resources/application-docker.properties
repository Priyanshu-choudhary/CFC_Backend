# =============================================================================
# DOCKER / ECS profile  (SPRING_PROFILES_ACTIVE=docker)
# Used for all containerised deployments. ALB terminates SSL so the app
# itself runs plain HTTP on port 9090.
#
# These ${ENV_VAR} placeholders are resolved at container startup from:
#   - ECS task definition  →  non-secret values (e.g. region, provider)
#   - AWS Secrets Manager  →  secrets (MongoDB URI, JWT secret, API keys)
#     referenced in the task definition as "valueFrom: <secret-arn>"
# =============================================================================

# ── MongoDB ───────────────────────────────────────────────────────────────────
spring.data.mongodb.uri=${MONGODB_URI}

# ── AWS S3 ────────────────────────────────────────────────────────────────────
aws.s3.bucket-name=${AWS_S3_BUCKET_NAME}
aws.cloudfront.domain=${AWS_CLOUDFRONT_DOMAIN}

# ── Redis / Valkey (ElastiCache Serverless) ───────────────────────────────────
redis.host=${REDIS_HOST:localhost}
redis.port=${REDIS_PORT:6379}
redis.tls=${REDIS_TLS:false}
redis.password=${REDIS_PASSWORD:}
# Safety net: if ElastiCache is reachable but slow, ops fail after 2 s.
# The commandTimeout in RedisConfig.java is the primary enforcement;
# these two are honoured by Spring Boot auto-config if it ever takes over.
spring.data.redis.timeout=2000ms
spring.data.redis.connect-timeout=500ms

# ── SQS — async execution pipeline ───────────────────────────────────────────
aws.sqs.jobs-queue-url=${SQS_JOBS_QUEUE_URL}

# ── Code execution provider (sync /judge/run and /judge/submit) ──────────────
# Switched from judge0 → goboxd (self-hosted nsjail sandbox behind public ALB).
# The provider id selects which @Service bean Spring wires into the controller
# via @ConditionalOnProperty; see CodeExecutionService / GoboxdService.
code.execution.provider=${CODE_EXECUTION_PROVIDER:goboxd}
goboxd.base-url=${GOBOXD_BASE_URL:http://goboxd-alb-2124591899.ap-south-1.elb.amazonaws.com:8080}
