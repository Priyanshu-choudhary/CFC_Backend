# =============================================================================
# DOCKER / ECS profile  (SPRING_PROFILES_ACTIVE=docker)
# Used for all containerised deployments. ALB terminates SSL so the app
# itself runs plain HTTP on port 9090.
#
# These ${ENV_VAR} placeholders are resolved at container startup from:
#   - ECS task definition  →  non-secret values (e.g. region, provider)
#   - AWS Secrets Manager  →  secrets (MongoDB URI, JWT secret, API keys)
#     referenced in the task definition as "valueFrom: <secret-arn>"
# =============================================================================

# ── MongoDB ───────────────────────────────────────────────────────────────────
spring.data.mongodb.uri=${MONGODB_URI}

# ── AWS S3 ────────────────────────────────────────────────────────────────────
aws.s3.bucket-name=${AWS_S3_BUCKET_NAME}
aws.cloudfront.domain=${AWS_CLOUDFRONT_DOMAIN}

# ── Redis / Valkey (ElastiCache Serverless) ───────────────────────────────────
redis.host=${REDIS_HOST}
redis.port=${REDIS_PORT:6379}
redis.tls=true

# ── SQS — async execution pipeline ───────────────────────────────────────────
aws.sqs.jobs-queue-url=${SQS_JOBS_QUEUE_URL}
